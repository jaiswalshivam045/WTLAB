<!DOCTYPE html>
<html>
<head>
<title>Scientific Calculator</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right,#ece8e9,#ece8e9);
    font-family:Arial;
}

.calculator{
    background:#e1ddde;
    padding:25px;
    border-radius:25px;
    box-shadow:10px 10px 20px #050404,
               -10px -10px 20px #070505;
}

.display{
    width:100%;
    height:70px;
    background:#3b2d33;
    border-radius:15px;
    margin-bottom:20px;
    text-align:right;
    padding:15px;
    font-size:30px;
    color:#4cff9d;
    box-sizing:border-box;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,70px);
    gap:12px;
}

button{
    height:60px;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    background:#5a4e5f;
    color:white;
    box-shadow:5px 5px 10px #4b3f4d,
               -5px -5px 10px #6b5d70;
}

button:active{
    box-shadow:inset 5px 5px 10px #4b3f4d,
               inset -5px -5px 10px #6b5d70;
}

.operator{ color:#00e5ff; }
.function{ color:#a020f0; }
.equal{
    grid-column:span 2;
    background:#7a6b6f;
    color:#00ff99;
}
.clear{ color:#ff6b81; }
</style>
</head>

<body>

<div class="calculator">

<div class="display" id="display">0</div>

<div class="buttons">

<button class="function" onclick="append('Math.sin(')">sin</button>
<button class="function" onclick="append('Math.cos(')">cos</button>
<button class="function" onclick="append('Math.tan(')">tan</button>
<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="del()">DEL</button>

<button class="function" onclick="append('Math.log10(')">log</button>
<button class="function" onclick="append('Math.log(')">ln</button>
<button onclick="append('(')">(</button>
<button onclick="append(')')">)</button>
<button class="operator" onclick="append('/')">÷</button>

<button class="function" onclick="append('Math.sqrt(')">√</button>
<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="operator" onclick="append('*')">×</button>

<button class="function" onclick="append('**')">x^y</button>
<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="operator" onclick="append('-')">−</button>

<button class="function" onclick="append('Math.PI')">π</button>
<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="operator" onclick="append('+')">+</button>

<button class="function" onclick="append('Math.E')">e</button>
<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="operator" onclick="append('%')">%</button>
<button class="equal" onclick="calculate()">=</button>

</div>
</div>
<script src="script.js"></script>

</body>
</html>
