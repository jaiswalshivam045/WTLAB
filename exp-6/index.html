<!DOCTYPE html>
<html>

<head>
    <title>Contact - My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

<div class="header">
<img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644">
</div>

<h1>School Registration</h1>
<h3>Jain College</h3>

<form>

<div class="section">

<h2>Student Information</h2>

<div class="row">

<div>
<label>First Name</label>
<input type="text" id="fname">
</div>

<div>
<label>Last Name</label>
<input type="text" id="lname">
</div>

</div>

<label>Birth Date</label>

<div class="row">

<div>
<input type="text" placeholder="Month" id="month">
</div>

<div>
<input type="text" placeholder="Day" id="day">
</div>

<div>
<input type="text" placeholder="Year" id="year">
</div>

</div>

<label>Gender</label>
<select id="gender">
<option>Please Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>Ethnicity</label>
<select id="ethnicity">
<option>Please Select</option>
<option>Asian</option>
<option>American</option>
<option>European</option>
</select>

<label>Email Address</label>
<input type="email" id="email">

<label>Phone Number</label>
<input type="text" id="phone">

<label>Grade</label>
<input type="text" id="grade">

<label>Semester</label>
<input type="text" id="semester">

</div>

<div class="section">

<h2>Current Residence Information</h2>

<label>Street Address</label>
<input type="text" id="address">

<label>Street Address Line 2</label>
<input type="text" id="address2">

<div class="row">

<div>
<label>City</label>
<input type="text" id="city">
</div>

<div>
<label>State / Province</label>
<input type="text" id="state">
</div>

</div>

<label>Postal / Zip Code</label>
<input type="text" id="zip">

</div>

<div class="submit-btn">
<button type="submit" id="submit">Submit</button>
</div>

</form>

<div id="output"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const submitBtn = document.getElementById("submit");

submitBtn.addEventListener("click", function(event){

event.preventDefault();

var fname = document.getElementById("fname").value;
var lname = document.getElementById("lname").value;

var month = document.getElementById("month").value;
var day = document.getElementById("day").value;
var year = document.getElementById("year").value;

var gender = document.getElementById("gender").value;
var ethnicity = document.getElementById("ethnicity").value;

var email = document.getElementById("email").value;
var phone = document.getElementById("phone").value;

var grade = document.getElementById("grade").value;
var semester = document.getElementById("semester").value;

var address = document.getElementById("address").value;
var address2 = document.getElementById("address2").value;

var city = document.getElementById("city").value;
var state = document.getElementById("state").value;
var zip = document.getElementById("zip").value;

var output = document.getElementById("output");

output.innerHTML = `
<div class="output">

<h3>Submitted Information</h3>

<p><b>First Name:</b> ${fname}</p>
<p><b>Last Name:</b> ${lname}</p>

<p><b>Birth Date:</b> ${month} ${day}, ${year}</p>

<p><b>Gender:</b> ${gender}</p>
<p><b>Ethnicity:</b> ${ethnicity}</p>

<p><b>Email:</b> ${email}</p>
<p><b>Phone:</b> ${phone}</p>

<p><b>Grade:</b> ${grade}</p>
<p><b>Semester:</b> ${semester}</p>

<p><b>Address:</b> ${address}</p>
<p><b>Address Line 2:</b> ${address2}</p>

<p><b>City:</b> ${city}</p>
<p><b>State:</b> ${state}</p>
<p><b>Zip Code:</b> ${zip}</p>

</div>
`;

});

});

</script>

</body>
</html>
